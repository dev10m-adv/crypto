name: secmail_crypto_sdk
description: A standalone, self-contained Flutter package providing OpenPGP and S/MIME cryptographic operations through a unified provider-based API.
version: 0.1.0
publish_to: none

environment:
  sdk: ">=3.9.0 <4.0.0"
  flutter: ">=3.35.0"

dependencies:
  flutter:
    sdk: flutter
  openpgp: ^3.10.7
  cryptography: ^2.7.0
  crypto: ^3.0.7
  flutter_secure_storage: ^10.0.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0
